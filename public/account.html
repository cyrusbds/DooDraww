<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Sniglet:wght@400;800&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Icons -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
    <title>SignIn/SignUp</title>
</head>
<body>
    
    <img class="img-bg" src="/public/Assets/Doodle-bg.png" alt="">

    <!-- SignUp/SignIn -->

    <div class="sign-main">
        <div class="sign-cont">
            <a href="index.html"><img class="nav-logo" src="/public/Assets/Doodraw.png" alt="Logo"></a>
            <div class="tab">
                <button class="active" id="signin-tab">Sign In</button>
                <button id="signup-tab">Sign Up</button>
            </div>
            <form id="signin-form">
                <h2>Welcome Back</h3>
                    <div class="signin-cont">
                        <input type="email" id="signin-email" placeholder="Email" required>
                        <input type="password" id="signin-password" placeholder="Password" required>
                        <button class="account-btn" id="signin-btn">Sign In</button>
                    </div>
            </form>
            <form id="signup-form">
                <h2>Create Account</h3>
                    <div class="signup-cont">
                        <input type="text" id="signup-name" placeholder="Username">
                        <input type="email" id="signup-email" placeholder="Email" required>
                        <input type="password" id="signup-password" placeholder="Password" required>
                        <button class="account-btn" id="signup-btn">Sign Up</button>
                    </div>
            </form>
        </div>
    </div>
    
    <script src="account.js"></script>
    <script src="script.js"></script>
</body>
</html>
